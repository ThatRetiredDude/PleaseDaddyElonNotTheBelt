[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py310"
exclude = ["pde/app.py", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "N"]
ignore = [
  "E402",  # import-after-check in PleaseDaddyElonNotTheBelt launcher
  "B008",  # ttk/ tk callbacks often pass lambda/callable
  "B904",  # re-raise patterns in app are intentional
  "E501",
  "ICN001",  # import-as-style (tk/mpl probe imports in deps)
]
[tool.ruff.lint.per-file-ignores]
"PleaseDaddyElonNotTheBelt.py" = ["I001"]  # two-phase import: deps, check, then app
"xeraser_analytics.py" = ["B023", "UP015"]
"pde/deps.py" = ["ICN001"]

[tool.mypy]
python_version = "3.10"
namespace_packages = true
explicit_package_bases = true
check_untyped_defs = false
warn_unused_ignores = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "pde.app"
ignore_errors = true
